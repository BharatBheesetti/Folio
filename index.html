    /* === VARIABLES === */
    :root {
      --bg: #FAF8F5;
      --bg-code: #F0ECE6;
      --bg-hover: #E8E3DD;
      --text: #292524;
      --text-secondary: #57534E;
      --text-muted: #8C8680;
      --border: #E7E5E4;
      --border-strong: #D6D3D1;
      --accent: #B45309;
      --accent-hover: #92400E;
      --chrome-tabs: #EEEBE6;
      --chrome-border: rgba(0,0,0,0.07);
      --shadow: rgba(0,0,0,0.05);
      --table-stripe: rgba(0,0,0,0.018);
      --hl-keyword: #9A3412; --hl-string: #3F6212; --hl-comment: #A8A29E;
      --hl-number: #1D4ED8; --hl-function: #7C3AED; --hl-type: #0E7490;
      --hl-variable: #292524; --hl-attr: #B45309; --hl-punctuation: #78716C;
    }
    [data-theme="dark"] {
      --bg: #1C1917;
      --bg-code: #262220;
      --bg-hover: #33302D;
      --text: #E7E5E4;
      --text-secondary: #A8A29E;
      --text-muted: #9C9590;
      --border: #33302D;
      --border-strong: #44403C;
      --accent: #F59E0B;
      --accent-hover: #FBBF24;
      --chrome-tabs: #141210;
      --chrome-border: rgba(255,255,255,0.06);
      --shadow: rgba(0,0,0,0.25);
      --table-stripe: rgba(255,255,255,0.02);
      --hl-keyword: #FB923C; --hl-string: #A3BE8C; --hl-comment: #6B7280;
      --hl-number: #93C5FD; --hl-function: #C4B5FD; --hl-type: #67E8F9;
      --hl-variable: #E7E5E4; --hl-attr: #F59E0B; --hl-punctuation: #78716C;
    }

    /* === FOCUS === */
    :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 4px; }
    .tab:focus-visible { outline-offset: -2px; }
    .tb-btn:focus-visible { outline-offset: 0; }

    /* === BASE === */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; -webkit-font-smoothing: antialiased; scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      padding-top: 48px;
      overflow-x: hidden;
      transition: background-color 0.3s ease, color 0.3s ease;
    }
    ::selection { background: rgba(180, 83, 9, 0.15); }
    [data-theme="dark"] ::selection { background: rgba(245, 158, 11, 0.2); }

    /* === SCROLLBAR === */
    ::-webkit-scrollbar { width: 7px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

    /* === TAB BAR === */
    #tab-bar {
      position: fixed; top: 0; left: 0; right: 0;
      height: 48px;
      display: flex; align-items: flex-end;
      padding: 0 6px; padding-right: 140px;
      background: var(--chrome-tabs);
      -webkit-app-region: drag;
      z-index: 100;
      border-bottom: 1px solid var(--chrome-border);
      transition: background-color 0.3s ease, border-color 0.3s ease;
    }
    #tab-bar.scrolled { box-shadow: 0 1px 3px var(--shadow); }
    #tabs-scroll {
      display: flex; align-items: flex-end;
      flex: 1; overflow-x: auto;
      gap: 1px; padding-top: 8px;
      scrollbar-width: none;
    }
    #tabs-scroll::-webkit-scrollbar { display: none; }

    /* === TABS === */
    .tab {
      -webkit-app-region: no-drag;
      display: flex; align-items: center;
      height: 38px; padding: 0 12px;
      max-width: 220px; min-width: 48px;
      border-radius: 10px 10px 0 0;
      cursor: pointer;
      color: var(--text-muted);
      background: transparent;
      font-family: 'Literata', Georgia, serif;
      font-size: 12.5px;
      gap: 6px;
      user-select: none;
      position: relative;
      flex-shrink: 0;
      transition: background 0.12s, color 0.12s;
    }
    .tab:hover {
      background: rgba(0,0,0,0.04);
      color: var(--text-secondary);
    }
    [data-theme="dark"] .tab:hover { background: rgba(255,255,255,0.05); }

    .tab.active {
      background: var(--bg);
      color: var(--text);
      margin-bottom: -1px;
      padding-bottom: 1px;
    }
    .tab.active::before {
      content: '';
      position: absolute; top: 0; left: 8px; right: 8px;
      height: 2px;
      background: var(--accent);
      border-radius: 0 0 2px 2px;
    }

    .tab-name {
      overflow: hidden; text-overflow: ellipsis;
      white-space: nowrap; flex: 1; min-width: 0;
    }
    .tab-close {
      -webkit-app-region: no-drag;
      display: flex; align-items: center; justify-content: center;
      width: 24px; height: 24px;
      border-radius: 4px; border: none;
      background: transparent; color: var(--text-muted);
      cursor: pointer; opacity: 0;
      font-size: 15px; padding: 0; flex-shrink: 0;
      transition: opacity 0.1s, background 0.1s;
    }
    .tab:hover .tab-close, .tab.active .tab-close, .tab:focus-within .tab-close { opacity: 0.6; }
    .tab-close:hover {
      opacity: 1 !important;
      background: rgba(0,0,0,0.1); color: var(--text);
    }
    [data-theme="dark"] .tab-close:hover { background: rgba(255,255,255,0.1); }

    /* === TAB CLOSING ANIMATION === */
    .tab-closing { transition: max-width 0.15s ease, opacity 0.15s ease; max-width: 0 !important; opacity: 0; overflow: hidden; padding: 0 !important; min-width: 0 !important; }

    /* === TAB BAR BUTTONS === */
    .tb-btn {
      -webkit-app-region: no-drag;
      display: flex; align-items: center; justify-content: center;
      width: 32px; height: 32px;
      border-radius: 8px; border: none;
      background: transparent; color: var(--text-muted);
      cursor: pointer; flex-shrink: 0;
      align-self: center;
      transition: background 0.12s, color 0.12s;
    }
    .tb-btn:hover { background: var(--bg-hover); color: var(--text); }
    #theme-btn { margin-left: 4px; }

    /* === WELCOME STATE === */
    #welcome {
      position: fixed; inset: 48px 0 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      font-family: 'Literata', Georgia, serif;
      animation: fadeInUp 0.4s ease;
      user-select: none;
    }
    .welcome-title { font-size: 1.8rem; margin: 0.75rem 0 0.25rem; font-weight: 700; color: var(--text); }
    .welcome-icon { margin-bottom: 0.25rem; }
    .welcome-btn { margin: 1rem 0 0.75rem; padding: 0.5rem 1.5rem; border: 1.5px solid var(--accent); background: transparent; color: var(--accent); font-family: 'Literata', serif; font-size: 0.9rem; border-radius: 6px; cursor: pointer; transition: all 0.15s; }
    .welcome-btn:hover { background: var(--accent); color: white; }
    .welcome-text { font-size: 1.1rem; color: var(--text-muted); font-weight: 400; }
    .welcome-hint {
      margin-top: 0.5rem; font-size: 0.8rem;
      color: var(--text-muted); opacity: 0.6;
    }
    #recent-list { margin-top: 1rem; text-align: left; max-width: 320px; }
    .recent-header { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.25rem; }
    .recent-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 0.35rem 0.5rem; color: var(--text-secondary); text-decoration: none;
      font-size: 0.85rem; border-radius: 4px; cursor: pointer; transition: background 0.1s;
    }
    .recent-item:hover { background: var(--bg-hover); color: var(--text); }
    .recent-dir { color: var(--text-muted); font-size: 0.75rem; margin-left: 0.5rem; }
    .recent-clear { font-size: 0.75rem; color: var(--text-muted); cursor: pointer; display: inline-block; margin-top: 0.25rem; padding: 0.2rem 0.5rem; }
    .recent-clear:hover { color: var(--accent); }
    .welcome-hint kbd {
      font-family: 'IBM Plex Mono', Consolas, monospace;
      font-size: 0.8em; background: var(--bg-code);
      padding: 2px 6px; border-radius: 4px; border: 1px solid var(--border);
    }

    /* === CONTENT === */
    #content {
      display: none;
      max-width: 720px; margin: 0 auto;
      padding: 2.5rem 2rem 8rem;
      font-family: 'Literata', Georgia, serif;
      font-size: 17px; line-height: 1.78;
      color: var(--text);
      font-optical-sizing: auto;
      transition: color 0.3s ease, opacity 0.1s ease;
    }
    #content.fade-in { animation: fadeIn 0.2s ease; }

    /* Headings */
    #content h1, #content h2, #content h3,
    #content h4, #content h5, #content h6 { line-height: 1.3; font-weight: 700; }
    #content h1 { font-size: 2em; margin: 2.2em 0 0.65em; letter-spacing: -0.025em; line-height: 1.2; }
    #content h2 { font-size: 1.5em; margin: 2em 0 0.55em; letter-spacing: -0.015em; }
    #content h3 { font-size: 1.25em; margin: 1.8em 0 0.5em; }
    #content h4 { font-size: 1.1em; margin: 1.6em 0 0.45em; }
    #content h5 { font-size: 0.85em; margin: 1.5em 0 0.4em; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-secondary); }
    #content h6 { font-size: 0.85em; margin: 1.4em 0 0.4em; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); }
    #content > :first-child { margin-top: 0; }

    /* Paragraphs & inline */
    #content p { margin: 1.15em 0; }
    #content > p:first-child { margin-top: 0; }
    #content strong { font-weight: 700; }
    #content em { font-style: italic; }
    #content del { opacity: 0.5; text-decoration: line-through; }

    /* Links */
    #content a { color: var(--accent); text-decoration: none; transition: color 0.15s; }
    #content a:hover { color: var(--accent-hover); text-decoration: underline; text-underline-offset: 2px; }

    /* Images */
    #content img { max-width: 100%; height: auto; border-radius: 6px; margin: 1.25em 0; display: block; }

    /* Blockquotes */
    #content blockquote {
      border-left: 3px solid var(--border-strong);
      margin: 1.5em 0; padding: 0.25em 0 0.25em 1.25em;
      color: var(--text-secondary);
    }
    #content blockquote p { margin: 0.5em 0; }
    #content blockquote blockquote { margin: 0.75em 0; }

    /* Lists */
    #content ul, #content ol { margin: 1.15em 0; padding-left: 1.75em; }
    #content li { margin: 0.3em 0; }
    #content li > ul, #content li > ol { margin: 0.25em 0; }
    #content ul:has(> li > input[type="checkbox"]) { list-style: none; padding-left: 0.25em; }
    #content li > input[type="checkbox"] { margin-right: 0.5em; accent-color: var(--accent); transform: translateY(1px); }

    /* Code — inline */
    #content :not(pre) > code {
      font-family: 'IBM Plex Mono', 'Cascadia Code', Consolas, monospace;
      font-size: 0.85em; background: var(--bg-code);
      padding: 0.15em 0.4em; border-radius: 4px; word-break: break-word;
    }

    /* Code — block */
    #content pre {
      position: relative;
      background: var(--bg-code); border: 1px solid var(--border);
      border-radius: 8px; padding: 1.2rem 1.4rem;
      margin: 1.5em 0; overflow-x: auto;
    }
    .copy-btn {
      position: absolute; top: 8px; right: 8px;
      padding: 4px 8px; border: 1px solid var(--border);
      background: var(--bg); color: var(--text-muted);
      border-radius: 4px; cursor: pointer; font-size: 11px;
      font-family: 'IBM Plex Mono', monospace;
      opacity: 0; transition: opacity 0.15s;
      z-index: 1;
    }
    #content pre:hover .copy-btn, #content pre:focus-within .copy-btn { opacity: 1; }
    .copy-btn:hover { color: var(--text); border-color: var(--border-strong); }
    .copy-btn.copied { color: var(--accent); border-color: var(--accent); }
    #content pre code {
      font-family: 'IBM Plex Mono', 'Cascadia Code', Consolas, monospace;
      font-size: 0.85em; line-height: 1.65;
      background: none; padding: 0; border-radius: 0; color: var(--text);
    }

    /* Syntax highlighting */
    .hljs-keyword, .hljs-selector-tag, .hljs-built_in, .hljs-name { color: var(--hl-keyword); }
    .hljs-string, .hljs-addition { color: var(--hl-string); }
    .hljs-comment, .hljs-quote, .hljs-meta { color: var(--hl-comment); font-style: italic; }
    .hljs-number, .hljs-literal, .hljs-regexp { color: var(--hl-number); }
    .hljs-title, .hljs-section { color: var(--hl-function); font-weight: 500; }
    .hljs-type { color: var(--hl-type); }
    .hljs-variable, .hljs-template-variable, .hljs-deletion { color: var(--hl-variable); }
    .hljs-attr, .hljs-attribute, .hljs-symbol { color: var(--hl-attr); }
    .hljs-punctuation, .hljs-tag { color: var(--hl-punctuation); }

    /* Tables */
    .table-wrap { overflow-x: auto; margin: 1.5em 0; }
    #content table { width: 100%; border-collapse: collapse; margin: 1.5em 0; font-size: 0.925em; }
    #content th, #content td { padding: 0.65em 1em; text-align: left; border-bottom: 1px solid var(--border); }
    #content th { font-weight: 600; color: var(--text-secondary); border-bottom: 2px solid var(--border-strong); white-space: nowrap; }
    #content tbody tr:nth-child(even) { background: var(--table-stripe); }

    /* HR */
    #content hr { border: none; margin: 3em 0; text-align: center; }
    #content hr::after { content: '\00B7\2002\00B7\2002\00B7'; color: var(--text-muted); font-size: 1.25em; }

    /* Details */
    #content details { margin: 1em 0; border: 1px solid var(--border); border-radius: 6px; padding: 0.5em 1em; }
    #content summary { cursor: pointer; font-weight: 600; padding: 0.25em 0; user-select: none; }
    #content details[open] summary { margin-bottom: 0.5em; }

    /* Misc */
    #content mark { background: rgba(245,158,11,0.2); padding: 0.1em 0.2em; border-radius: 2px; }
    #content sup { font-size: 0.75em; }
    #content .footnotes { margin-top: 3em; padding-top: 1.5em; border-top: 1px solid var(--border); font-size: 0.9em; color: var(--text-secondary); }

    /* === SEARCH BAR === */
    #search-bar {
      position: fixed; top: 48px; right: 0;
      display: none; align-items: center; gap: 6px;
      padding: 6px 12px; background: var(--chrome-tabs);
      border: 1px solid var(--chrome-border); border-top: none;
      border-radius: 0 0 8px 8px; z-index: 101;
      font-family: 'IBM Plex Mono', monospace; font-size: 13px;
    }
    #search-bar.visible { display: flex; }
    #search-input {
      width: 200px; padding: 4px 8px; border: 1px solid var(--border);
      background: var(--bg); color: var(--text); border-radius: 4px;
      font-family: inherit; font-size: inherit; outline: none;
    }
    #search-input:focus { border-color: var(--accent); }
    #search-count { color: var(--text-muted); font-size: 11px; min-width: 50px; }
    .search-nav-btn {
      border: none; background: transparent; color: var(--text-muted);
      cursor: pointer; padding: 2px 6px; border-radius: 3px; font-size: 12px;
    }
    .search-nav-btn:hover { background: var(--bg-hover); color: var(--text); }

    /* === PROGRESS BAR === */
    #progress-bar {
      position: fixed; top: 48px; left: 0; height: 2px;
      background: var(--accent); z-index: 99;
      width: 0; transition: width 0.1s;
    }

    /* === STATUS BAR === */
    #status-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: 28px; background: var(--chrome-tabs);
      border-top: 1px solid var(--chrome-border);
      display: none; align-items: center; justify-content: space-between;
      padding: 0 12px; font-size: 12px; color: var(--text-muted);
      font-family: 'IBM Plex Mono', monospace;
      z-index: 100;
      transition: background-color 0.3s ease;
    }
    #status-bar.visible { display: flex; }
    .zoom-btn {
      width: 22px; height: 22px; border: 1px solid var(--border);
      background: transparent; color: var(--text-muted); border-radius: 3px;
      cursor: pointer; font-size: 13px; margin: 0 2px;
    }
    .zoom-btn:hover { background: var(--bg-hover); color: var(--text); }
    #zoom-level { font-size: 11px; min-width: 36px; text-align: center; }

    /* === OUTLINE PANEL === */
    #outline-panel {
      position: fixed; top: 48px; right: 0; bottom: 0;
      width: 260px; background: var(--bg);
      border-left: 1px solid var(--border);
      transform: translateX(100%); transition: transform 0.2s ease;
      z-index: 98; overflow-y: auto; padding: 0;
    }
    #outline-panel.visible { transform: translateX(0); }
    #outline-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 16px; font-family: 'Literata', serif; font-weight: 600;
      font-size: 13px; color: var(--text-secondary);
      border-bottom: 1px solid var(--border); position: sticky; top: 0;
      background: var(--bg);
    }
    #outline-list a {
      display: block; padding: 6px 16px; color: var(--text-secondary);
      text-decoration: none; font-size: 13px; font-family: 'Literata', serif;
      border-left: 2px solid transparent; transition: all 0.1s;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    #outline-list a:hover { color: var(--text); background: var(--bg-hover); }
    #outline-list a.active { color: var(--accent); border-left-color: var(--accent); }
    #outline-list a[data-level="2"] { padding-left: 32px; }
    #outline-list a[data-level="3"] { padding-left: 48px; }
    #outline-list a[data-level="4"] { padding-left: 64px; }
    #outline-list a[data-level="5"] { padding-left: 80px; }
    #outline-list a[data-level="6"] { padding-left: 96px; }

    /* === LOADING INDICATOR === */
    .loading-dots { text-align: center; padding: 3rem; color: var(--text-muted); font-family: 'Literata', serif; }
    .loading-dots::after { content: ''; animation: dots 1.2s steps(4, end) infinite; }
    @keyframes dots { 0% { content: ''; } 25% { content: '.'; } 50% { content: '..'; } 75% { content: '...'; } }

    /* === ANIMATIONS === */
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    /* === DRAG OVERLAY === */
    body.drag-over::after {
      content: 'Drop to open'; position: fixed; inset: 3px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Literata', Georgia, serif; font-size: 1.1rem;
      color: var(--accent); background: rgba(0,0,0,0.03);
      border: 2px dashed var(--accent); border-radius: 8px;
      pointer-events: none; z-index: 300; opacity: 0.45;
    }

    /* === SIDEBAR === */
    #sidebar {
      position: fixed; top: 48px; left: 0; bottom: 0;
      width: 260px; background: var(--bg);
      border-right: 1px solid var(--border);
      transform: translateX(-100%); transition: transform 0.2s ease;
      z-index: 98; overflow-y: auto; overflow-x: hidden;
      display: flex; flex-direction: column;
    }
    #sidebar.visible { transform: translateX(0); }
    body.sidebar-open #content,
    body.sidebar-open #welcome { margin-left: 260px; }
    body.sidebar-open #tab-bar { padding-left: 260px; }

    #sidebar-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 12px; border-bottom: 1px solid var(--border);
      position: sticky; top: 0; background: var(--bg); z-index: 1;
      gap: 6px; flex-shrink: 0;
    }
    #sidebar-header span {
      font-family: 'Literata', serif; font-weight: 600;
      font-size: 13px; color: var(--text-secondary);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      flex: 1; min-width: 0;
    }
    #sidebar-open-folder {
      border: none; background: transparent; color: var(--text-muted);
      cursor: pointer; padding: 2px 6px; border-radius: 3px; font-size: 12px;
      flex-shrink: 0;
    }
    #sidebar-open-folder:hover { background: var(--bg-hover); color: var(--text); }
    #sidebar-close { flex-shrink: 0; }

    #file-tree {
      flex: 1; overflow-y: auto; padding: 4px 0;
      font-family: 'IBM Plex Mono', monospace; font-size: 12.5px;
    }
    .tree-item {
      display: flex; align-items: center;
      padding: 4px 12px; cursor: pointer;
      color: var(--text-secondary); text-decoration: none;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      transition: background 0.08s;
      user-select: none;
    }
    .tree-item:hover { background: var(--bg-hover); color: var(--text); }
    .tree-item.active { color: var(--accent); background: rgba(180, 83, 9, 0.06); }
    [data-theme="dark"] .tree-item.active { background: rgba(245, 158, 11, 0.08); }

    .tree-icon {
      width: 16px; height: 16px; flex-shrink: 0; margin-right: 6px;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-muted);
    }
    .tree-item.active .tree-icon { color: var(--accent); }
    .tree-folder-toggle {
      width: 16px; height: 16px; flex-shrink: 0; margin-right: 2px;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-muted); transition: transform 0.15s;
    }
    .tree-folder-toggle.open { transform: rotate(90deg); }
    .tree-name { overflow: hidden; text-overflow: ellipsis; }
    .ai-badge {
      font-size: 10px; padding: 1px 4px; border-radius: 3px;
      background: #7c3aed; color: white; margin-left: 4px;
      flex-shrink: 0; font-family: 'IBM Plex Mono', monospace;
      line-height: 1.4; font-weight: 500; letter-spacing: 0.02em;
    }
    [data-theme="dark"] .ai-badge { background: #8b5cf6; }
    .tree-children { display: none; }
    .tree-children.open { display: block; }

    .sidebar-empty {
      padding: 1.5rem 1rem; text-align: center;
      font-family: 'Literata', serif; font-size: 13px;
      color: var(--text-muted);
    }
    .sidebar-empty-btn {
      display: inline-block; margin-top: 0.5rem;
      padding: 0.3rem 0.8rem; border: 1px solid var(--accent);
      background: transparent; color: var(--accent);
      font-family: 'Literata', serif; font-size: 12px;
      border-radius: 4px; cursor: pointer; transition: all 0.15s;
    }
    .sidebar-empty-btn:hover { background: var(--accent); color: white; }

    /* === CROSS-FILE SEARCH PANEL === */
    #cross-file-search {
      position: fixed; top: 48px; left: 0; bottom: 0;
      width: 320px; background: var(--bg);
      border-right: 1px solid var(--border);
      transform: translateX(-100%); transition: transform 0.2s ease;
      z-index: 99; overflow: hidden;
      display: flex; flex-direction: column;
    }
    #cross-file-search.visible { transform: translateX(0); }
    body.cross-search-open #content,
    body.cross-search-open #welcome { margin-left: 320px; }
    body.cross-search-open #tab-bar { padding-left: 320px; }
    #cfs-header {
      display: flex; align-items: center; gap: 6px;
      padding: 10px 12px; border-bottom: 1px solid var(--border);
      flex-shrink: 0; background: var(--bg);
    }
    #cfs-input {
      flex: 1; padding: 5px 8px; border: 1px solid var(--border);
      background: var(--bg-code); color: var(--text); border-radius: 4px;
      font-family: 'IBM Plex Mono', monospace; font-size: 12.5px; outline: none;
    }
    #cfs-input:focus { border-color: var(--accent); }
    #cfs-close {
      border: none; background: transparent; color: var(--text-muted);
      cursor: pointer; padding: 2px 6px; border-radius: 3px; font-size: 14px;
      flex-shrink: 0;
    }
    #cfs-close:hover { background: var(--bg-hover); color: var(--text); }
    #cfs-status {
      padding: 4px 12px; font-family: 'IBM Plex Mono', monospace;
      font-size: 11px; color: var(--text-muted); flex-shrink: 0;
      border-bottom: 1px solid var(--border);
    }
    #cfs-results {
      flex: 1; overflow-y: auto; padding: 4px 0;
      font-family: 'IBM Plex Mono', monospace; font-size: 12px;
    }
    .cfs-file-group { margin-bottom: 2px; }
    .cfs-file-header {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 12px; color: var(--text);
      font-weight: 500; font-size: 12px;
      cursor: default; user-select: none;
    }
    .cfs-file-header .cfs-match-count {
      color: var(--text-muted); font-weight: 400; font-size: 11px;
    }
    .cfs-match {
      display: block; padding: 3px 12px 3px 28px;
      color: var(--text-secondary); text-decoration: none;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      cursor: pointer; transition: background 0.08s; font-size: 12px;
      line-height: 1.5;
    }
    .cfs-match:hover { background: var(--bg-hover); color: var(--text); }
    .cfs-match .cfs-line-num {
      color: var(--text-muted); margin-right: 6px; font-size: 11px;
    }
    .cfs-match .cfs-highlight {
      color: var(--accent); font-weight: 500;
    }
    .cfs-empty {
      padding: 1.5rem 1rem; text-align: center;
      font-family: 'Literata', serif; font-size: 13px;
      color: var(--text-muted);
    }

    /* === PRINT === */
    @media print {
      #tab-bar, #status-bar, #search-bar, #outline-panel, #progress-bar, #welcome, #sidebar, #cross-file-search { display: none !important; }
      body { padding-top: 0; }
      #content { display: block !important; max-width: none; padding: 0; margin-left: 0 !important; }
    }

    /* === RESPONSIVE === */
    @media (max-width: 600px) {
      #content { padding: 1.5rem 1.5rem 6rem; font-size: 16px; }
      body.sidebar-open #content,
      body.sidebar-open #welcome { margin-left: 0; }
      body.sidebar-open #tab-bar { padding-left: 0; }
      #sidebar { width: 100%; }
      #cross-file-search { width: 100%; }
      body.cross-search-open #content,
      body.cross-search-open #welcome { margin-left: 0; }
      body.cross-search-open #tab-bar { padding-left: 0; }
    }
  </style>
</head>
<body>
  <header id="tab-bar">
    <div id="tabs-scroll"></div>
    <button class="tb-btn" id="sidebar-btn" title="Toggle sidebar (Ctrl+B)" aria-label="Toggle sidebar">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 3h18v18H3z"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
    </button>
    <button class="tb-btn" id="new-tab-btn" title="Open file (Ctrl+T)" aria-label="Open file">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>
    <button class="tb-btn" id="outline-btn" title="Toggle outline" aria-label="Toggle outline"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="15" y2="12"/><line x1="3" y1="18" x2="18" y2="18"/></svg></button>
    <button class="tb-btn" id="theme-btn" title="Toggle theme"></button>
  </header>
  <div id="search-bar">
    <input id="search-input" type="text" placeholder="Find in page..." spellcheck="false">
    <span id="search-count"></span>
    <button class="search-nav-btn" id="search-prev" title="Previous">&#9650;</button>
    <button class="search-nav-btn" id="search-next" title="Next">&#9660;</button>
    <button class="search-nav-btn" id="search-close" title="Close">&times;</button>
  </div>
  <aside id="sidebar">
    <div id="sidebar-header">
      <span id="sidebar-title">Files</span>
      <button id="sidebar-open-folder" title="Open folder">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
      </button>
      <button id="sidebar-close" class="search-nav-btn" title="Close sidebar">&times;</button>
    </div>
    <div id="file-tree">
      <div class="sidebar-empty">
        <p>Open a folder to browse markdown files</p>
        <button class="sidebar-empty-btn" id="sidebar-empty-open">Open Folder</button>
      </div>
    </div>
  </aside>
  <aside id="cross-file-search">
    <div id="cfs-header">
      <input id="cfs-input" type="text" placeholder="Search in folder..." spellcheck="false">
      <button id="cfs-close" title="Close (Escape)">&times;</button>
    </div>
    <div id="cfs-status"></div>
    <div id="cfs-results"></div>
  </aside>
  <div id="welcome" role="main">
    <svg class="welcome-icon" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color:var(--accent)"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
    <h1 class="welcome-title">Folio</h1>
    <p class="welcome-text">A beautiful reading experience for Markdown</p>
    <button id="welcome-open-btn" class="welcome-btn">Open File</button>
    <p class="welcome-hint"><kbd>Ctrl+T</kbd> &middot; <kbd>Ctrl+O</kbd> &middot; drag &amp; drop</p>
    <div id="recent-list"></div>
  </div>
  <article id="content" role="main"></article>
  <aside id="outline-panel">
    <div id="outline-header">
      <span>Outline</span>
      <button id="outline-close" class="search-nav-btn">&times;</button>
    </div>
    <nav id="outline-list"></nav>
  </aside>

  <div id="progress-bar"></div>
  <footer id="status-bar">
    <span id="stats-text"></span>
    <span id="zoom-controls">
      <button class="zoom-btn" id="zoom-out">&minus;</button>
      <span id="zoom-level">100%</span>
      <button class="zoom-btn" id="zoom-in">+</button>
    </span>
  </footer>


  <script src="renderer.js"></script>
</body>
</html>
